name: Update HF Space Secrets

on:
  push:
    paths:
      - '.github/scripts/hf_update_secrets.py'
      - '.github/scripts/hf_create_spaces.py'
      - '.env'
  workflow_dispatch:

jobs:
  update_secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface_hub python-dotenv requests
      
      - name: Update secrets in spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python .github/scripts/hf_update_secrets.py
